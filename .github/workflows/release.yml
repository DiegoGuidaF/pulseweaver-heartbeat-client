name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  JAVA_VERSION: '21'

jobs:
  # ---------------------------------------------------------------------------
  # Android
  # ---------------------------------------------------------------------------
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/release.keystore"

      - name: Build signed APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: ./gradlew assembleRelease -PappVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename APK
        run: |
          APK=$(find androidApp/build/outputs/apk/release -name '*.apk' | head -1)
          cp "$APK" "PulseWeaver-Heartbeat-${{ github.ref_name }}-android.apk"

      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: android-apk
          path: PulseWeaver-Heartbeat-*-android.apk

  # ---------------------------------------------------------------------------
  # Linux
  # ---------------------------------------------------------------------------
  build-linux:
    name: Linux packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb
        run: ./gradlew :shared:packageDeb -PappVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename artifact
        run: |
          DEB=$(find shared/build/compose/binaries/main/deb -name '*.deb' | head -1)
          cp "$DEB" "PulseWeaver-Heartbeat-${{ github.ref_name }}-linux-amd64.deb"

      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: linux-deb
          path: PulseWeaver-Heartbeat-*-linux-amd64.deb

  # ---------------------------------------------------------------------------
  # macOS
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .dmg
        run: ./gradlew :shared:packageDmg -PappVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename artifact
        run: |
          DMG=$(find shared/build/compose/binaries/main/dmg -name '*.dmg' | head -1)
          cp "$DMG" "PulseWeaver-Heartbeat-${{ github.ref_name }}-macos.dmg"

      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: macos-dmg
          path: PulseWeaver-Heartbeat-*-macos.dmg

  # ---------------------------------------------------------------------------
  # Windows
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .msi
        shell: bash
        run: ./gradlew :shared:packageMsi -PappVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename artifact
        shell: bash
        run: |
          MSI=$(find shared/build/compose/binaries/main/msi -name '*.msi' | head -1)
          cp "$MSI" "PulseWeaver-Heartbeat-${{ github.ref_name }}-windows.msi"

      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: windows-msi
          path: PulseWeaver-Heartbeat-*-windows.msi

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Publish Release
    needs: [build-android, build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          merge-multiple: true

      - name: Generate changelog
        uses: orhun/git-cliff-action@4cfa85f3bef62b9c6aedeaadccf5fbaee97b4b00 # v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@4cfa85f3bef62b9c6aedeaadccf5fbaee97b4b00 # v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md
        env:
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore(ci): update CHANGELOG.md for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            PulseWeaver-Heartbeat-*-android.apk
            PulseWeaver-Heartbeat-*-linux-amd64.deb
            PulseWeaver-Heartbeat-*-macos.dmg
            PulseWeaver-Heartbeat-*-windows.msi
