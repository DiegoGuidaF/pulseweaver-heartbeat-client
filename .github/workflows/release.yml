name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/test.yml

  check-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker:
              - 'docker/**'

  create-release:
    name: Create GitHub Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract release notes
        run: awk '/^## \[/{if(found)exit; found=1} found' CHANGELOG.md > RELEASE_NOTES.md

      - name: Append build notice
        run: echo -e "\n---\n_Build artifacts are being assembled and will appear below within ~15 minutes._" >> RELEASE_NOTES.md

      - name: Publish release (no artifacts yet)
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md

  build-docker:
    name: Docker image
    needs: [test, check-changes]
    if: needs.check-changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./docker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-android:
    name: Android APK
    needs: [test, create-release]
    permissions:
      contents: write
    uses: ./.github/workflows/_build.yml
    with:
      runs-on: ubuntu-latest
      gradle-task: ':androidApp:assembleRelease'
      artifact-dir: androidApp/build/outputs/apk/release
      artifact-pattern: '*.apk'
      output-name: PulseWeaver-Companion-${{ github.ref_name }}-android.apk
      app-version: ${{ github.ref_name }}
      needs-keystore: true
      upload-to-release: true
      release-tag: ${{ github.ref_name }}
    secrets: inherit

  build-linux:
    name: Linux packages
    needs: [test, create-release]
    permissions:
      contents: write
    uses: ./.github/workflows/_build.yml
    with:
      runs-on: ubuntu-latest
      gradle-task: ':shared:packageDeb'
      artifact-dir: shared/build/compose/binaries/main/deb
      artifact-pattern: '*.deb'
      output-name: PulseWeaver-Companion-${{ github.ref_name }}-linux-amd64.deb
      app-version: ${{ github.ref_name }}
      upload-to-release: true
      release-tag: ${{ github.ref_name }}
    secrets: inherit

  build-macos:
    name: macOS DMG
    needs: [test, create-release]
    permissions:
      contents: write
    uses: ./.github/workflows/_build.yml
    with:
      runs-on: macos-latest
      gradle-task: ':shared:packageDmg'
      artifact-dir: shared/build/compose/binaries/main/dmg
      artifact-pattern: '*.dmg'
      output-name: PulseWeaver-Companion-${{ github.ref_name }}-macos.dmg
      app-version: ${{ github.ref_name }}
      upload-to-release: true
      release-tag: ${{ github.ref_name }}
    secrets: inherit

  build-windows:
    name: Windows MSI
    needs: [test, create-release]
    permissions:
      contents: write
    uses: ./.github/workflows/_build.yml
    with:
      runs-on: windows-latest
      gradle-task: ':shared:packageMsi'
      artifact-dir: shared/build/compose/binaries/main/msi
      artifact-pattern: '*.msi'
      output-name: PulseWeaver-Companion-${{ github.ref_name }}-windows.msi
      app-version: ${{ github.ref_name }}
      upload-to-release: true
      release-tag: ${{ github.ref_name }}
    secrets: inherit
