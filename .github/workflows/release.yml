name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  JAVA_VERSION: '21'

jobs:
  # ---------------------------------------------------------------------------
  # Android
  # ---------------------------------------------------------------------------
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/release.keystore"

      - name: Build signed APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: ./gradlew assembleRelease -PappVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename APK
        run: |
          APK=$(find androidApp/build/outputs/apk/release -name '*.apk' | head -1)
          cp "$APK" "PulseWeaver-Heartbeat-${{ github.ref_name }}-android.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: PulseWeaver-Heartbeat-*-android.apk

  # ---------------------------------------------------------------------------
  # Linux
  # ---------------------------------------------------------------------------
  build-linux:
    name: Linux packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb
        run: ./gradlew :shared:packageDeb -PappVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename artifact
        run: |
          DEB=$(find shared/build/compose/binaries/main/deb -name '*.deb' | head -1)
          cp "$DEB" "PulseWeaver-Heartbeat-${{ github.ref_name }}-linux-amd64.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: PulseWeaver-Heartbeat-*-linux-amd64.deb

  # ---------------------------------------------------------------------------
  # macOS
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .dmg
        run: ./gradlew :shared:packageDmg -PappVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename artifact
        run: |
          DMG=$(find shared/build/compose/binaries/main/dmg -name '*.dmg' | head -1)
          cp "$DMG" "PulseWeaver-Heartbeat-${{ github.ref_name }}-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: PulseWeaver-Heartbeat-*-macos.dmg

  # ---------------------------------------------------------------------------
  # Windows
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .msi
        run: ./gradlew :shared:packageMsi -PappVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename artifact
        shell: bash
        run: |
          MSI=$(find shared/build/compose/binaries/main/msi -name '*.msi' | head -1)
          cp "$MSI" "PulseWeaver-Heartbeat-${{ github.ref_name }}-windows.msi"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: PulseWeaver-Heartbeat-*-windows.msi

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Publish Release
    needs: [build-android, build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            PulseWeaver-Heartbeat-*-android.apk
            PulseWeaver-Heartbeat-*-linux-amd64.deb
            PulseWeaver-Heartbeat-*-macos.dmg
            PulseWeaver-Heartbeat-*-windows.msi
