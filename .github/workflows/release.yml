name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  JAVA_VERSION: '21'

jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/test.yml

  build-android:
    name: Android APK
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/release.keystore"

      - name: Build signed APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: ./gradlew :androidApp:assembleRelease -PappVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename APK
        run: |
          APK=$(find androidApp/build/outputs/apk/release -name '*.apk' | head -1)
          cp "$APK" "PulseWeaver-Heartbeat-${{ github.ref_name }}-android.apk"

      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: PulseWeaver-Heartbeat-*-android.apk

  build-linux:
    name: Linux packages
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb
        run: ./gradlew :shared:packageDeb -PappVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename artifact
        run: |
          DEB=$(find shared/build/compose/binaries/main/deb -name '*.deb' | head -1)
          cp "$DEB" "PulseWeaver-Heartbeat-${{ github.ref_name }}-linux-amd64.deb"

      - uses: actions/upload-artifact@v7
        with:
          name: linux-deb
          path: PulseWeaver-Heartbeat-*-linux-amd64.deb

  build-macos:
    name: macOS DMG
    needs: test
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .dmg
        run: ./gradlew :shared:packageDmg -PappVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename artifact
        run: |
          DMG=$(find shared/build/compose/binaries/main/dmg -name '*.dmg' | head -1)
          cp "$DMG" "PulseWeaver-Heartbeat-${{ github.ref_name }}-macos.dmg"

      - uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: PulseWeaver-Heartbeat-*-macos.dmg

  build-windows:
    name: Windows MSI
    needs: test
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .msi
        shell: bash
        run: ./gradlew :shared:packageMsi -PappVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename artifact
        shell: bash
        run: |
          MSI=$(find shared/build/compose/binaries/main/msi -name '*.msi' | head -1)
          cp "$MSI" "PulseWeaver-Heartbeat-${{ github.ref_name }}-windows.msi"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-msi
          path: PulseWeaver-Heartbeat-*-windows.msi

  release:
    name: Publish Release
    needs: [build-android, build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Update CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "chore(ci): update CHANGELOG.md for ${{ github.ref_name }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            PulseWeaver-Heartbeat-*-android.apk
            PulseWeaver-Heartbeat-*-linux-amd64.deb
            PulseWeaver-Heartbeat-*-macos.dmg
            PulseWeaver-Heartbeat-*-windows.msi