name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  JAVA_VERSION: '21'

jobs:
  test:
    permissions:
      contents: read
    uses: ./.github/workflows/test.yml

  check-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            docker:
              - 'docker/**'

  create-release:
    name: Create GitHub Release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract release notes
        run: awk '/^## \[/{if(found)exit; found=1} found' CHANGELOG.md > RELEASE_NOTES.md

      - name: Append build notice
        run: echo -e "\n---\n_Build artifacts are being assembled and will appear below within ~15 minutes._" >> RELEASE_NOTES.md

      - name: Publish release (no artifacts yet)
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md

  build-docker:
    name: Docker image
    needs: [test, check-changes]
    if: needs.check-changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./docker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-android:
    name: Android APK
    needs: [test, create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v6

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$GITHUB_WORKSPACE/release.keystore"

      - name: Build signed APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: ./gradlew :androidApp:assembleRelease -PappVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename APK
        run: |
          APK=$(find androidApp/build/outputs/apk/release -name '*.apk' | head -1)
          cp "$APK" "PulseWeaver-Heartbeat-${{ github.ref_name }}-android.apk"

      - name: Upload to release
        run: gh release upload "${{ github.ref_name }}" PulseWeaver-Heartbeat-*-android.apk --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  build-linux:
    name: Linux packages
    needs: [test, create-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v6

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb
        run: ./gradlew :shared:packageDeb -PappVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename artifact
        run: |
          DEB=$(find shared/build/compose/binaries/main/deb -name '*.deb' | head -1)
          cp "$DEB" "PulseWeaver-Heartbeat-${{ github.ref_name }}-linux-amd64.deb"

      - name: Upload to release
        run: gh release upload "${{ github.ref_name }}" PulseWeaver-Heartbeat-*-linux-amd64.deb --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  build-macos:
    name: macOS DMG
    needs: [test, create-release]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v6

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .dmg
        run: ./gradlew :shared:packageDmg -PappVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename artifact
        run: |
          DMG=$(find shared/build/compose/binaries/main/dmg -name '*.dmg' | head -1)
          cp "$DMG" "PulseWeaver-Heartbeat-${{ github.ref_name }}-macos.dmg"

      - name: Upload to release
        run: gh release upload "${{ github.ref_name }}" PulseWeaver-Heartbeat-*-macos.dmg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  build-windows:
    name: Windows MSI
    needs: [test, create-release]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v6

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .msi
        shell: bash
        run: ./gradlew :shared:packageMsi -PappVersion=${{ steps.version.outputs.version }} --stacktrace

      - name: Rename artifact
        shell: bash
        run: |
          MSI=$(find shared/build/compose/binaries/main/msi -name '*.msi' | head -1)
          cp "$MSI" "PulseWeaver-Heartbeat-${{ github.ref_name }}-windows.msi"

      - name: Upload to release
        shell: bash
        run: gh release upload "${{ github.ref_name }}" PulseWeaver-Heartbeat-*-windows.msi --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
