name: Build Desktop app

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-desktop:
    name: Build Desktop
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21
      - name: Desktop JVM build
        run: ./gradlew :shared:compileKotlinJvm --stacktrace
