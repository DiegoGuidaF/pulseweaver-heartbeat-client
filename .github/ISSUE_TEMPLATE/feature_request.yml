name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point. "I want to..." or "It's frustrating when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Heartbeat / scheduling
        - Network-aware retries
        - Pairing / onboarding
        - Biometric lock / security
        - System tray / desktop UX
        - Android
        - iOS
        - Desktop (macOS/Windows/Linux)
        - Docker
        - Documentation
        - Other
    validations:
      required: true
