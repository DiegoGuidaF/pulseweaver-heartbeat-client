name: Bug Report
description: Something is not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing a bug, please skim the [README](../README.md) setup steps and [SECURITY.md](../SECURITY.md) — some behaviours are intentional. For usage questions, use Discussions instead.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the Companion and pair with ...
        2. Move the device to ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Desktop — macOS
        - Desktop — Windows
        - Desktop — Linux
        - Docker container
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS / device version
      placeholder: "Android 15 (Pixel 8), macOS 15.2, Ubuntu 24.04, ..."

  - type: input
    id: app_version
    attributes:
      label: Companion version
      placeholder: "v0.1.0 or build number"
    validations:
      required: true

  - type: input
    id: server_version
    attributes:
      label: PulseWeaver server version
      placeholder: "v0.5.0 or Docker image tag"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
